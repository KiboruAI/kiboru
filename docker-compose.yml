version: '3.8'

services:
  kiboru:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: kiboru-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./agents/kiboru:/root/.openclaw/agents/kiboru
      - ./agents/scheduler:/root/.openclaw/agents/scheduler
      - ./agents/researcher:/root/.openclaw/agents/researcher
      - ./agents/onchain:/root/.openclaw/agents/onchain
      - ./agents/comms:/root/.openclaw/agents/comms
      - ./agents/memory:/root/.openclaw/agents/memory
      - ./workspace:/root/.openclaw/workspace
      - openclaw_data:/root/.openclaw/data
    env_file:
      - .env
    environment:
      - OPENCLAW_AGENT=kiboru
      - OPENCLAW_WORKSPACE=/root/.openclaw/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openclaw_data:
